name: Deploy Parent POM Artifacts

on:
  push:
    branches: [ "master", "main" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Publish Parent POM
    uses: anahata-os/anahata-os-pom/.github/workflows/shared-maven-build.yml@master
    with:
      deploy-type: 'artifacts'
    secrets: inherit

  trigger-downstream:
    needs: deploy
    name: Trigger Downstream Build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Downstream Build in anahata-os-pom
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: anahata-os/anahata-os-pom
          event-type: upstream-pom-updated
        continue-on-error: true