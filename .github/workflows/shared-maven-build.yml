name: Shared Maven Build & Deploy

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '25'
        required: false
    secrets:
      PAT_TOKEN:
        required: false
      GPG_PRIVATE_KEY:
        required: false
      GPG_PASSPHRASE:
        required: false
      CENTRAL_USERNAME:
        required: false
      CENTRAL_PASSWORD:
        required: false

jobs:
  build-and-deploy:
    name: Shared Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Trust Anahata Insecure HTTP Artifactory
        run: |
          mkdir -p ~/.m2
          echo '<settings><mirrors><mirror><id>allow-http</id><mirrorOf>external:http:*,!anahata-public</mirrorOf><url>http://repo.anahata.uno/artifactory/anahata-public/</url></mirror></mirrors></settings>' > ~/.m2/settings.xml

      - name: Set up JDK & Maven
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'
          # Must match the <server><id> in settings.xml and <distributionManagement>
          server-id: sonatype-central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Get Project Version
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build & Deploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Resolved Maven version: $VERSION"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            if [[ "$VERSION" == *-SNAPSHOT ]]; then
              echo "[ERROR] Cannot deploy a SNAPSHOT version ($VERSION) to the production Maven Central Release portal!"
              exit 1
            fi
            echo "[INFO] Tag trigger with release version detected. Deploying to Sonatype Central Release portal..."
            mvn deploy -DskipTests -P release -ntp
          else
            if [[ "$VERSION" != *-SNAPSHOT ]]; then
              echo "[INFO] Branch trigger with release version ($VERSION) detected. Skipping Sonatype Snapshot deployment to prevent bad coordinate rejection."
              mvn package -DskipTests -P release -ntp
            else
              echo "[INFO] Branch trigger with SNAPSHOT version ($VERSION) detected. Deploying to Sonatype Snapshot repository..."
              mvn deploy -DskipTests -P release -ntp -DaltSnapshotDeploymentRepository=sonatype-central::default::https://central.sonatype.com/repository/maven-snapshots/
            fi
          fi
