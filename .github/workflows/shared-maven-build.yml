name: Shared OS Build & Deploy Pipeline

on:
  workflow_call:
    inputs:
      deploy-type:
        type: string
        default: 'artifacts'  # Can be 'artifacts' or 'website'
        required: false
      java-version:
        type: string
        default: '25'
        required: false
    secrets:
      PAT_TOKEN:
        required: false
      GPG_PRIVATE_KEY:
        required: false
      GPG_PASSPHRASE:
        required: false
      CENTRAL_USERNAME:
        required: false
      CENTRAL_PASSWORD:
        required: false

jobs:
  build-and-deploy:
    name: Shared Build & Deploy
    if: ${{ inputs.deploy-type == 'artifacts' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK & Maven
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: sonatype-central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Trust Artifactory & Load Sonatype Credentials
        run: |
          mkdir -p ~/.m2
          cat << 'EOF' > ~/.m2/settings.xml
          <settings>
            <servers>
              <server>
                <id>sonatype-central</id>
                <username>${{ secrets.CENTRAL_USERNAME }}</username>
                <password>${{ secrets.CENTRAL_PASSWORD }}</password>
              </server>
            </servers>
            <mirrors>
              <mirror>
                <id>maven-default-http-blocker</id>
                <mirrorOf>external:http:*,!anahata-public</mirrorOf>
                <url>http://repo.anahata.uno/artifactory/anahata-public/</url>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Get Project Version
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build & Deploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Resolved Maven version: $VERSION"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            if [[ "$VERSION" == *-SNAPSHOT ]]; then
              echo "[ERROR] Cannot deploy a SNAPSHOT version ($VERSION) to the production Maven Central Release portal!"
              exit 1
            fi
            echo "[INFO] Tag trigger with release version detected. Deploying to Sonatype Central Release portal..."
            mvn deploy -DskipTests -P release -ntp
          else
            if [[ "$VERSION" != *-SNAPSHOT ]]; then
              echo "[INFO] Branch trigger with release version ($VERSION) detected. Skipping Sonatype Snapshot deployment to prevent bad coordinate rejection."
              mvn package -DskipTests -P release -ntp
            else
              echo "[INFO] Branch trigger with SNAPSHOT version ($VERSION) detected. Deploying to Sonatype Snapshot repository..."
              mvn deploy -DskipTests -P release -ntp -DaltSnapshotDeploymentRepository=sonatype-central::default::https://central.sonatype.com/repository/maven-snapshots/
            fi
          fi

  deploy-website:
    name: Shared Javadoc & Pages Deploy
    if: ${{ inputs.deploy-type == 'website' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK & Maven
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Trust Artifactory & Load Sonatype Credentials
        run: |
          mkdir -p ~/.m2
          cat << 'EOF' > ~/.m2/settings.xml
          <settings>
            <servers>
              <server>
                <id>sonatype-central</id>
                <username>${{ secrets.CENTRAL_USERNAME }}</username>
                <password>${{ secrets.CENTRAL_PASSWORD }}</password>
              </server>
            </servers>
            <mirrors>
              <mirror>
                <id>maven-default-http-blocker</id>
                <mirrorOf>external:http:*,!anahata-public</mirrorOf>
                <url>http://repo.anahata.uno/artifactory/anahata-public/</url>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Build and Generate Javadoc
        run: mvn clean install javadoc:javadoc -DskipTests -ntp

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Deployment Directory
        run: |
          mkdir -p _site
          if [ -f "index.html" ]; then
            cp index.html _site/
          fi
          mkdir -p _site/apidocs
          cp -r target/site/apidocs/* _site/apidocs/
          project_name=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          echo "$project_name.anahata.uno" > _site/CNAME

      - name: Upload Website Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
